<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdleWorker</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="app">
    <header id="status-bar">
      <div class="status-item" id="status-level">
        <span class="label">LV</span>
        <span id="level-value" class="value">1</span>
      </div>
      <div class="status-item" id="status-title">
        <span class="label">TITLE</span>
        <span id="title-value" class="value">拾荒者</span>
      </div>
    </header>

    <main id="log-area">
      <div class="log-entry system" id="welcome-log">
        <span class="ts">[SYSTEM]</span>
        <span class="msg">IdleWorker v0.2.0 启动完成。挂机中...</span>
      </div>
    </main>

    <footer id="button-bar">
      <button id="btn-scenario" class="bar-btn">剧本</button>
      <button id="btn-titles" class="bar-btn">称号</button>
      <button id="btn-about" class="bar-btn">状态</button>
      <button id="btn-settings" class="bar-btn">设置</button>
      <button id="btn-hide" class="bar-btn">隐藏</button>
    </footer>
  </div>

  <div id="event-overlay" class="hidden">
    <div id="event-box">
      <div id="event-header">
        <span id="event-title">事件</span>
      </div>
      <div id="event-body">
        <p id="event-text"></p>
      </div>
    </div>
  </div>

  <div id="achievement-overlay" class="hidden">
    <div id="achievement-box">
      <div id="achievement-header">成就解锁</div>
      <div id="achievement-body">
        <span id="achievement-icon">★</span>
        <div id="achievement-info">
          <span id="achievement-name"></span>
          <span id="achievement-desc"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="about-panel" class="hidden">
    <div id="about-box">
      <div id="about-header">
        <span>状态</span>
        <button id="about-close">✕</button>
      </div>
      <div id="about-body">
        <div class="about-row"><span class="about-label">版本</span><span id="about-version" class="about-value">0.2.0-beta</span></div>
        <div class="about-row"><span class="about-label">玩家</span><span id="about-player" class="about-value">Worker</span></div>
        <div class="about-row"><span class="about-label">剧本</span><span id="about-scenario" class="about-value">废土</span></div>
        <div class="about-row"><span class="about-label">等级</span><span id="about-level" class="about-value">1</span></div>
        <div class="about-row"><span class="about-label">称号</span><span id="about-title" class="about-value">拾荒者</span></div>
        <div class="about-row"><span class="about-label">时长</span><span id="about-runtime" class="about-value">00:00:00</span></div>
        <div class="about-row"><span class="about-label">成就</span><span id="about-achievements" class="about-value">0</span></div>
      </div>
    </div>
  </div>

  <div id="scenario-panel" class="hidden">
    <div id="scenario-panel-header">
      <span>剧本选择</span>
      <button id="scenario-close">✕</button>
    </div>
    <div id="scenario-list"></div>
  </div>

  <div id="settings-panel" class="hidden">
    <div id="settings-header">
      <span>设置</span>
      <button id="settings-close">✕</button>
    </div>
    <div id="settings-body">
      <div class="setting-row">
        <label>名称</label>
        <input type="text" id="settings-name" />
        <button id="settings-name-save">保存</button>
      </div>
      <div class="setting-row">
        <label>主题</label>
        <select id="settings-theme">
          <option value="green">绿色终端</option>
          <option value="amber">琥珀色</option>
          <option value="cold">冷白</option>
          <option value="paper">纸质</option>
          <option value="matrix">矩阵</option>
        </select>
      </div>
    </div>
  </div>

  <div id="titles-panel" class="hidden">
    <div id="titles-panel-header">
      <span>称号一览</span>
      <button id="titles-close">✕</button>
    </div>
    <div id="titles-list"></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
