<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idel-DreamMaker</title>
  <style>
    @font-face {
      font-family: 'MapleMonoNFCN';
      src: url('/fonts/MapleMono-NF-CN-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'MapleMonoNFCN';
      src: url('/fonts/MapleMono-NF-CN-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }
  </style>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <div id="titlebar-drag">
        <span id="titlebar-id">ID:Worker</span>
        <span class="titlebar-sep">|</span>
        <span id="titlebar-lv">LV:1</span>
        <span class="titlebar-sep">|</span>
        <span id="titlebar-title">拾荒者</span>
      </div>
      <div id="titlebar-btns">
        <button id="btn-minimize" class="titlebar-btn">─</button>
        <button id="btn-maximize" class="titlebar-btn">□</button>
        <button id="btn-close" class="titlebar-btn titlebar-btn-close">×</button>
      </div>
    </div>

    <main id="hub-view">
      <div id="hub-welcome">
        <div id="hub-greeting">欢迎回来</div>
        <div id="hub-player-name">Worker</div>
        <div id="hub-level-display">大厅 Lv.1</div>
      </div>
      <div id="hub-scenario-list"></div>
      <button id="hub-draw-btn">+ 抽取副本</button>
    </main>

    <main id="log-area" class="hidden">
      <div class="log-entry system" id="welcome-log">
        <span class="ts">[SYSTEM]</span>
        <span class="msg">Idel-DreamMaker v0.3.4 启动完成。挂机中...</span>
      </div>
    </main>

    <div id="perma-status">Worker | Hub Lv.1 | ? | — | 成就:0</div>
    <footer id="button-bar">
      <button id="btn-mini" class="bar-btn">迷你</button>
      <button id="btn-backhub" class="bar-btn hidden">返回大厅</button>
      <button id="btn-scenario" class="bar-btn">副本</button>
      <button id="btn-titles" class="bar-btn">称号</button>
      <button id="btn-about" class="bar-btn">状态</button>
      <button id="btn-settings" class="bar-btn">设置</button>
      <button id="btn-hide" class="bar-btn">隐藏</button>
    </footer>
  </div>

  <div id="mini-bar" class="hidden">
    <div id="mini-row1">
      <button id="mini-expand">▶</button>
      <span id="mini-id">ID:Worker</span>
      <span id="mini-level">Lv.1</span>
      <span id="mini-title">拾荒者</span>
    </div>
    <div id="mini-row2">
      <div id="mini-progress-bg"><div id="mini-progress-fill" style="width:0%"></div></div>
      <span id="mini-pct">0%</span>
    </div>
    <div id="mini-row3">
      <button id="mini-collapse">─</button>
      <button id="mini-close">×</button>
    </div>
  </div>

  <div id="alias-modal" class="hidden">
    <div id="alias-overlay"></div>
    <div id="alias-box">
      <div id="alias-title">进入副本</div>
      <div id="alias-desc"></div>
      <input type="text" id="alias-input" placeholder="输入名称（留空用默认）" spellcheck="false" />
      <div id="alias-buttons">
        <button id="alias-cancel">取消</button>
        <button id="alias-confirm">进入</button>
      </div>
    </div>
  </div>

  <div id="event-overlay" class="hidden">
    <div id="event-box">
      <div id="event-header"><span id="event-title">事件</span></div>
      <div id="event-body"><p id="event-text"></p></div>
    </div>
  </div>

  <div id="achievement-overlay" class="hidden">
    <div id="achievement-box">
      <div id="achievement-header">成就解锁</div>
      <div id="achievement-body">
        <span id="achievement-icon">★</span>
        <div id="achievement-info">
          <span id="achievement-name"></span>
          <span id="achievement-desc"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="about-panel" class="hidden">
    <div id="about-box">
      <div id="about-header"><span>状态</span><button id="about-close">✕</button></div>
      <div id="about-body">
        <div class="about-row"><span class="about-label">版本</span><span id="about-version" class="about-value">v0.3.5</span></div>
        <div class="about-row"><span class="about-label">玩家</span><span id="about-player" class="about-value">Worker</span></div>
        <div class="about-row"><span class="about-label">副本</span><span id="about-scenario" class="about-value">废土</span></div>
        <div class="about-row"><span class="about-label">等级</span><span id="about-level" class="about-value">1</span></div>
        <div class="about-row"><span class="about-label">称号</span><span id="about-title" class="about-value">拾荒者</span></div>
        <div class="about-row"><span class="about-label">时长</span><span id="about-runtime" class="about-value">00:00:00</span></div>
        <div class="about-row"><span class="about-label">成就</span><span id="about-achievements" class="about-value">0</span></div>
      </div>
    </div>
  </div>

  <div id="scenario-panel" class="hidden">
    <div id="scenario-panel-header"><span>副本选择</span><button id="scenario-close">✕</button></div>
    <div id="scenario-list"></div>
  </div>

  <div id="settings-panel" class="hidden">
    <div id="settings-header"><span>设置</span><button id="settings-close">✕</button></div>
    <div id="settings-body">
      <div class="setting-row"><label>名称</label><input type="text" id="settings-name" /><button id="settings-name-save">保存</button></div>
      <div class="setting-row"><label>主题</label><select id="settings-theme">
        <option value="green">绿色终端</option><option value="amber">琥珀色</option><option value="cold">冷白</option><option value="paper">纸质</option><option value="matrix">矩阵</option>
      </select></div>
      <div class="setting-row"><label>界面语言</label><select id="settings-language"><option value="zh">中文</option><option value="en">English</option></select></div>
      <div class="setting-row"><label>AI 语言</label><select id="settings-ai-language"><option value="zh">中文</option><option value="en">English</option></select></div>
    </div>
  </div>

  <div id="titles-panel" class="hidden">
    <div id="titles-panel-header"><span>称号一览</span><button id="titles-close">✕</button></div>
    <div id="titles-list"></div>
  </div>

  <div id="debug-panel" class="hidden">
    <div id="debug-header"><span>Debug</span><button id="debug-close">✕</button></div>
    <pre id="debug-content"></pre>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
