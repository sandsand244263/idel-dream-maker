<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet</title>
  <style>
    @font-face { font-family:'MapleMonoNFCN'; src:url('../public/fonts/MapleMono-NF-CN-Regular.ttf') format('truetype'); font-weight:normal; font-style:normal; font-display:swap; }
    @font-face { font-family:'MapleMonoNFCN'; src:url('../public/fonts/MapleMono-NF-CN-Bold.ttf') format('truetype'); font-weight:bold; font-style:normal; font-display:swap; }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <div id="info-bar"><span id="info-text"></span></div>
    <div id="no-pet-guide" class="hidden">
      <div id="guide-icon">?</div>
      <div id="guide-title">还未拥有宠物</div>
      <div id="guide-desc">从 petdex.dev（需登录 + 网络工具）下载精灵图，解压后将文件夹放入 pets 目录</div>
      <div id="guide-buttons">
        <button id="guide-open-folder">打开宠物文件夹</button>
        <button id="guide-petdex">前往 petdex.dev</button>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="pet-canvas"></canvas>
      <div id="bubble-dot" class="dot-none"><span id="dot-symbol">○</span></div>
    </div>
    <div id="bubble-zone" class="zone-hidden">
      <div id="bubble-text"></div>
    </div>
    <div id="exp-wrap">
      <div id="exp-track"><div id="exp-fill"></div></div>
      <span id="exp-pct"></span>
      <span id="exp-detail"></span>
      <span id="key-detail"></span>
    </div>
  </div>
  <script src="pet.js"></script>
</body>
</html>
