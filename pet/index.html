<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <div id="info-bar"><span id="info-text"></span></div>
    <div id="canvas-wrap">
      <canvas id="pet-canvas"></canvas>
      <div id="bubble-dot" class="dot-none"><span id="dot-symbol">○</span></div>
    </div>
    <div id="bubble-zone" class="hidden">
      <div id="bubble-text"></div>
    </div>
    <div id="ctx-menu" class="hidden">
      <div id="ctx-prev">&#9664; 上一个宠物</div>
      <div id="ctx-next">下一个宠物 &#9654;</div>
      <div class="ctx-sep"></div>
      <div id="ctx-close">&#10005; 隐藏</div>
    </div>
    <div id="exp-wrap">
      <div id="exp-track"><div id="exp-fill"></div></div>
      <span id="exp-pct"></span>
      <span id="exp-detail"></span>
    </div>
  </div>
  <script src="pet.js"></script>
</body>
</html>
