<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet</title>
  <style>
    @font-face { font-family:'MapleMonoNFCN'; src:url('../public/fonts/MapleMono-NF-CN-Regular.ttf') format('truetype'); font-weight:normal; font-style:normal; }
    @font-face { font-family:'MapleMonoNFCN'; src:url('../public/fonts/MapleMono-NF-CN-Bold.ttf') format('truetype'); font-weight:bold; font-style:normal; }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <div id="info-bar"><span id="info-text"></span></div>
    <div id="canvas-wrap">
      <canvas id="pet-canvas"></canvas>
      <div id="bubble-dot" class="dot-none"><span id="dot-symbol">○</span></div>
    </div>
    <div id="bubble-zone" class="zone-hidden">
      <div id="bubble-text"></div>
    </div>
    <div id="exp-wrap">
      <div id="exp-track"><div id="exp-fill"></div></div>
      <span id="exp-pct"></span>
      <span id="exp-detail"></span>
    </div>
  </div>
  <div id="ctx-overlay" class="hidden">
    <div id="ctx-menu">
      <div id="ctx-select-pet" class="ctx-item">选择宠物 <span style="float:right">&#9654;</span></div>
      <div class="ctx-sep"></div>
      <div id="ctx-toggle-border">&#10003; 显示边框</div>
      <div id="ctx-toggle-infobar">&#10003; 信息栏</div>
      <div id="ctx-toggle-expbar">&#10003; 进度条</div>
      <div class="ctx-sep"></div>
      <div id="ctx-open-folder" class="ctx-item">打开宠物文件夹</div>
      <div class="ctx-sep"></div>
      <div id="ctx-close" class="ctx-item">&#10005; 隐藏</div>
    </div>
  </div>
  <script src="pet.js"></script>
</body>
</html>
