<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="pet-container">
    <div id="title-bar">
      <span id="pet-name">Pet</span>
      <div id="title-btns">
        <button id="btn-expand">◀</button>
        <button id="btn-close">×</button>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="pet-canvas"></canvas>
    </div>
    <div id="info-bar">
      <span id="info-level">Lv.1</span>
      <span id="info-title">—</span>
    </div>
    <div id="exp-bar-bg">
      <div id="exp-bar-fill" style="width:0%"></div>
    </div>
    <div id="pet-select-bar">
      <button id="btn-prev">◀</button>
      <span id="pet-select-name">—</span>
      <button id="btn-next">▶</button>
    </div>
  </div>
  <div id="disclaimer" title="宠物精灵由玩家自行从 PetDex 社区获取，版权归原作者或 IP 权利人所有">ⓘ</div>
  <script src="pet.js"></script>
</body>
</html>
