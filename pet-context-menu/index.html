<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>菜单</title>
  <style>
    @font-face { font-family:'MapleMonoNFCN'; src:url('../public/fonts/MapleMono-NF-CN-Regular.ttf') format('truetype'); font-weight:normal; font-style:normal; font-display:swap; }
    @font-face { font-family:'MapleMonoNFCN'; src:url('../public/fonts/MapleMono-NF-CN-Bold.ttf') format('truetype'); font-weight:bold; font-style:normal; font-display:swap; }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <div class="ctx-item" id="ctx-select-pet"><span data-i18n="selectPet">选择宠物</span> <span class="ctx-arrow">&#9654;</span></div>
    <div class="ctx-sep"></div>
    <div class="ctx-item fold-header" id="ctx-fold-view">
      <span class="fold-arrow">&#9654;</span> <span data-i18n="view">视图</span>
    </div>
    <div class="fold-body" id="ctx-fold-body">
      <div class="ctx-item ctx-toggle ctx-sub" id="ctx-toggle-border">&#10003; <span data-i18n="border">显示边框</span></div>
      <div class="ctx-item ctx-toggle ctx-sub" id="ctx-toggle-infobar">&#10003; <span data-i18n="infobar">信息栏</span></div>
      <div class="ctx-item ctx-toggle ctx-sub" id="ctx-toggle-expbar">&#10003; <span data-i18n="expbar">进度条</span></div>
      <div class="ctx-item ctx-toggle ctx-sub" id="ctx-toggle-chime">&#10003; <span data-i18n="chime">整点报时</span></div>
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item ctx-tool" id="ctx-calc"><span data-i18n="calculator">计算器</span></div>
    <div class="ctx-item ctx-tool" id="ctx-screenshot"><span data-i18n="screenshot">截图</span></div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" id="ctx-guide"><span data-i18n="guide">操作说明</span></div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" id="ctx-close">&#10005; <span data-i18n="hide">隐藏宠物界面</span></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
