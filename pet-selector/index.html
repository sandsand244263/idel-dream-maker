<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>选择宠物</title>
  <style>
    @font-face { font-family:'MapleMonoNFCN'; src:url('../public/fonts/MapleMono-NF-CN-Regular.ttf') format('truetype'); font-weight:normal; font-style:normal; font-display:swap; }
    @font-face { font-family:'MapleMonoNFCN'; src:url('../public/fonts/MapleMono-NF-CN-Bold.ttf') format('truetype'); font-weight:bold; font-style:normal; font-display:swap; }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <div id="header"><span data-i18n="back">返回</span> <span class="sel-arrow">&#9654;</span></div>
    <div id="pet-list"></div>
    <div id="footer">
      <span id="hint" data-i18n="hint">从 petdex.dev（需登录+网络工具）下载精灵图，解压后将文件夹放入</span>
      <button id="btn-open-folder" data-i18n="openFolder">打开文件夹</button>
      <button id="btn-petdex-link" data-i18n="petdexLink">前往 petdex.dev 下载</button>
      <div id="disclaimer" data-i18n="disclaimer">宠物精灵为社区用户创作的同人作品，版权归各自权利人。本软件不捆绑、不分发任何精灵文件。</div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
