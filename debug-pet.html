<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Pet Animation Debug</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">
<h2 style="color:#0f0">Pet Animation Debug</h2>
<p id="load-status" style="color:#ff0">请选择精灵图文件</p>

<canvas id="c" width="120" height="140" style="border:1px solid #0f0;display:block;margin:20px 0;image-rendering:pixelated"></canvas>

<div style="margin:10px 0">
  <input type="file" id="file-input" accept=".webp,.png">
  <button onclick="loadFile()">加载精灵图</button>
  <button onclick="runAnim('review')">Run Review</button>
  <button onclick="runAnim('wave')">Run Wave</button>
  <button onclick="runAnim('jump')">Run Jump</button>
  <button onclick="runAnim('idle')">Run Idle</button>
  <button onclick="stepFrame()">Step &#9654;</button>
  <span id="step-display" style="color:#888;font-size:12px;margin-left:10px">-</span>
  <button onclick="stopAll()">Stop</button>
  <button onclick="logEl.textContent=''">Clear Log</button>
</div>

<p style="color:#888;font-size:12px">
  选择 spritesheet.webp 或 spritesheet.png 后点击"加载精灵图"
</p>

<pre id="log" style="margin-top:20px;background:#000;padding:10px;border:1px solid #0f0;min-height:200px;overflow:auto;font-size:12px"></pre>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const logEl=document.getElementById('log');
const loadStatus=document.getElementById('load-status');
const FW=192,FH=208;

const DEFAULT_STATES={
  idle:{row:0,frames:6,dur:140,firstMult:2,lastMult:2.3},
  wave:{row:1,frames:4,dur:140,firstMult:2,lastMult:2},
  run:{row:2,frames:8,dur:120,firstMult:1.5,lastMult:1.8},
  failed:{row:3,frames:8,dur:140,firstMult:1.5,lastMult:1.7},
  review:{row:4,frames:6,dur:150,firstMult:1.5,lastMult:1.8},
  jump:{row:5,frames:5,dur:140,firstMult:2,lastMult:2},
  extra1:{row:6,frames:6,dur:140,firstMult:1.5,lastMult:1.8},
  extra2:{row:7,frames:6,dur:140,firstMult:1.5,lastMult:1.8},
  extra3:{row:8,frames:6,dur:140,firstMult:1.5,lastMult:1.8},
};

let spritesheet=null,frameList=[],frameIdx=0,animFrameId=null,curState='idle',lastFrameTime=0;
let cycleCount=0;
let stepIdx=-1,stepFrames=[],stepTotal=0,stepState='';

function log(msg){logEl.textContent+=msg+'\n';console.log(msg);}

function updateStepDisplay(){
  const el=document.getElementById('step-display');
  if(stepIdx<0||stepFrames.length===0){el.textContent='-';return;}
  el.textContent=`当前帧: ${stepIdx}/${stepFrames.length} | 累计: ${stepTotal}ms`;
}

function log(msg){logEl.textContent+=msg+'\n';console.log(msg);}

function loadStateCfg(s){return DEFAULT_STATES[s]||DEFAULT_STATES.idle;}
function buildFrames(s){
  const c=loadStateCfg(s),n=c.frames,b=c.dur,f=[];
  for(let i=0;i<n;i++){
    let d=b;
    if(i===0)d*=c.firstMult||2;
    else if(i===n-1)d*=c.lastMult||2;
    f.push({c:i,r:c.row,d});
  }
  return f;
}
function drawSprite(col,row){
  if(!spritesheet)return;
  ctx.clearRect(0,0,120,140);
  ctx.drawImage(spritesheet,col*FW,row*FH,FW,FH,0,0,120,140);
}
function stopAnim(){
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
}

function animLoop(now){
  if(!animFrameId)return;
  const elapsed=now-lastFrameTime;
  const dur=frameList[frameIdx]?frameList[frameIdx].d:140;
  if(elapsed>=dur){
    const prev=frameIdx;
    if(frameIdx===frameList.length-1 && curState!=='idle'){
      stopAnim();
      log(`[${curState}] 播完最后一帧(帧${prev})后停住, 不循环`);
      return;
    }
    frameIdx=(frameIdx+1)%frameList.length;
    log(`[${curState}] 帧 ${prev} → ${frameIdx} (${elapsed.toFixed(0)}ms)`);
    if(frameIdx===0&&prev===frameList.length-1){
      cycleCount++;
      log(`[${curState}] 进入第 ${cycleCount} 轮循环`);
    }
    lastFrameTime=now;
  }
  drawSprite(frameList[frameIdx].c,frameList[frameIdx].r);
  animFrameId=requestAnimationFrame(animLoop);
}

function play(s){
  stopAnim();
  curState=s;
  frameList=buildFrames(s);
  const totalMs=frameList.reduce((sf,fd)=>sf+fd.d,0);
  log(`=== ${s} ===`);
  log(`帧数:${frameList.length}, 每帧:[${frameList.map(f=>f.d).join(',')}], 总计:${totalMs}ms`);
  if(!frameList.length)return;
  frameIdx=0;cycleCount=0;
  drawSprite(frameList[0].c,frameList[0].r);
  if(frameList.length===1)return;
  lastFrameTime=performance.now();
  animFrameId=requestAnimationFrame(animLoop);
}

// Step one frame forward
function stepFrame(){
  if(!spritesheet){log('请先加载精灵图');return;}
  if(!stepFrames.length||stepIdx>=stepFrames.length-1){
    const s='review';
    stepState=s;stepFrames=buildFrames(s);stepIdx=-1;stepTotal=0;
    log(`=== ${s} 步进模式 ===`);
    log(`帧数:${stepFrames.length}, 每帧:[${stepFrames.map(f=>f.d).join(',')}], 总计:${stepFrames.reduce((sf,fd)=>sf+fd.d,0)}ms`);
    stopAnim();curState=s;
  }
  stepIdx++;
  if(stepIdx<stepFrames.length){
    stepTotal=stepFrames.slice(0,stepIdx+1).reduce((sf,fd)=>sf+fd.d,0);
    drawSprite(stepFrames[stepIdx].c,stepFrames[stepIdx].r);
    log(`[${stepState}] 帧 ${stepIdx}/${stepFrames.length-1} → 累计 ${stepTotal}ms`);
    updateStepDisplay();
  }else{log(`[${stepState}] 播完所有帧，总计 ${stepTotal}ms`);}
}

// Simulate transitionTo with totalMs-50
function runAnim(s){
  stopAll();
  if(s==='idle'){setTimeout(()=>play(s),50);return;}
  setTimeout(()=>{
    play(s);
    const frames=buildFrames(s);
    const totalMs=frames.reduce((sf,fd)=>sf+fd.d,0);
    const delay=Math.max(0,totalMs-50);
    log(`[回弹计时器] ${delay}ms 后切回 idle (totalMs=${totalMs})`);
    setTimeout(()=>{
      log(`[回弹触发] 此时 curState=${curState}，准备切 idle`);
      if(curState!=='idle'){
        play('idle');
        log(`[切换完成] 已切到 idle`);
      }else{
        log(`[无需切换] 已是 idle`);
      }
    },delay);
  },100);
}

function stopAll(){
  stopAnim();
  if(window.rt){clearTimeout(window.rt);window.rt=null;}
}

// File loader
function loadFile(){
  const file=document.getElementById('file-input').files[0];
  if(!file){log('请先选择文件');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const data=e.target.result;
    const img=new Image();
    img.onload=function(){
      // Clean alpha
      const oc=document.createElement('canvas');
      oc.width=img.naturalWidth;oc.height=img.naturalHeight;
      const octx=oc.getContext('2d');
      octx.drawImage(img,0,0);
      const d=octx.getImageData(0,0,oc.width,oc.height);
      for(let i=3;i<d.data.length;i+=4){if(d.data[i]>0&&d.data[i]<24)d.data[i]=0;}
      octx.putImageData(d,0,0);
      spritesheet=oc;
      loadStatus.textContent='精灵图已加载 ('+oc.width+'x'+oc.height+')';
      log('精灵图加载成功 '+oc.width+'x'+oc.height);
      // Show frame count
      const cols=Math.floor(oc.width/192);
      const rows=Math.floor(oc.height/208);
      log('帧网格: '+cols+'x'+rows);
    };
    img.onerror=function(){log('图片加载失败，请确认是有效图片');};
    img.src=data;
  };
  reader.readAsDataURL(file);
}

log('=== Pet Animation Debug ===');
log('1. 选择精灵图文件 → 点加载');
log('2. 点 Run Review / Wave / Jump 测试');
log('3. 查看日志确认是否进入第二轮循环');
</script>
</body>
</html>
