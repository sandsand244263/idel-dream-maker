<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idel-DreamMaker 主题设计器</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --fg: #00FF00; --bg: #0A0A0A; --dim: #00AA00; --border: #00FF00;
  --g1: #0A0A0A; --g2: #1A1A1A; --blur: 8px;
}

html, body { width: 100%; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; overflow: hidden; }
#app { display: flex; height: 100vh; }

/* Left panel */
#controls { width: 400px; min-width: 400px; overflow-y: auto; background: #222; border-right: 1px solid #444; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
#controls::-webkit-scrollbar { width: 4px; }
#controls::-webkit-scrollbar-track { background: transparent; }
#controls::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

h2 { font-size: 14px; color: #fff; letter-spacing: 1px; }
h3 { font-size: 12px; color: #aaa; margin: 0 0 6px; border-bottom: 1px solid #333; padding-bottom: 3px; }

.section { background: #2a2a2a; border-radius: 6px; padding: 8px 10px; }

/* Color grid */
.color-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.color-btn { padding: 6px 2px; font-size: 11px; background: #333; border: 2px solid transparent; border-radius: 4px; color: #aaa; cursor: pointer; font-family: inherit; text-align: center; transition: all 0.1s; }
.color-btn:hover { border-color: #888; color: #fff; }
.color-btn.active { border-color: #0078D7; color: #fff; }
.color-btn.custom-btn { margin-top: 4px; grid-column: 1 / -1; border-style: dashed; border-color: #555; }

/* Custom colors (hidden by default) */
#customColors { display: none; }
#customColors.show { display: block; }
.custom-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.custom-row label { font-size: 11px; color: #ccc; min-width: 60px; }
.custom-row input[type="color"] { width: 28px; height: 22px; padding: 0; border: 1px solid #444; border-radius: 3px; background: transparent; cursor: pointer; }
.custom-row input[type="text"] { flex: 1; background: #333; border: 1px solid #444; color: #eee; padding: 2px 5px; font-size: 10px; border-radius: 3px; font-family: 'Consolas', monospace; }


/* Export */
.export-box { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 8px; }
.export-box pre { font-family: 'Consolas', monospace; font-size: 10px; color: #ccc; white-space: pre-wrap; word-break: break-all; line-height: 1.4; max-height: 100px; overflow-y: auto; }
.cp-btn { display: block; margin-top: 4px; width: 100%; padding: 5px 0; background: #0078D7; border: none; color: #fff; font-size: 11px; cursor: pointer; border-radius: 3px; letter-spacing: 1px; }
.cp-btn:hover { background: #1a8ae8; }
.cp-btn:active { transform: scale(0.98); }
.cp-btn.copied { background: #388e3c; }

.note { font-size: 10px; color: #555; line-height: 1.4; }

/* Preview */
#preview-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #111; position: relative; overflow: hidden; }
#preview-area::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 30% 30%, #4A90D9, transparent 50%), radial-gradient(ellipse at 70% 70%, #87CEEB, transparent 50%), radial-gradient(ellipse at 50% 50%, #5CB85C, transparent 40%); opacity: 0.15; pointer-events: none; }

.phone { width: 320px; height: 720px; border-radius: 12px; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05); display: flex; flex-direction: column; background: var(--bg); color: var(--fg); font-family: 'Consolas', 'Courier New', monospace; position: relative; transition: background 0.15s, color 0.15s; }
.phone.gradient-bg { background: linear-gradient(180deg, var(--g1), var(--g2)); }

.titlebar { display: flex; align-items: center; height: 28px; flex-shrink: 0; border-bottom: 1px solid var(--dim); user-select: none; position: relative; z-index: 1; transition: background 0.15s; }
.titlebar-id { color: var(--fg); font-weight: bold; font-size: 12px; padding-left: 6px; white-space: nowrap; }
.titlebar-sep { color: var(--dim); font-size: 10px; margin: 0 2px; }
.titlebar-lv { color: var(--fg); font-size: 12px; white-space: nowrap; }
.titlebar-title { color: var(--fg); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.titlebar-btns { display: flex; }
.titlebar-btn { width: 28px; height: 28px; background: transparent; border: none; color: var(--dim); font-size: 12px; cursor: default; display: flex; align-items: center; justify-content: center; }

.hub-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.hub-welcome { text-align: center; padding: 10px 10px; border-bottom: 1px solid var(--dim); flex-shrink: 0; }
.hub-greeting { font-size: 11px; color: var(--dim); letter-spacing: 1px; }
.hub-player-name { font-size: 14px; font-weight: bold; color: var(--fg); margin: 3px 0; }
.hub-level { font-size: 12px; color: var(--dim); }

.hub-cards { flex: 1; overflow-y: auto; padding: 6px 8px; }
.card { border-radius: 12px; padding: 8px 8px; margin-bottom: 6px; background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); }

.exp-row { flex-shrink: 0; padding: 4px 10px; display: flex; align-items: center; gap: 8px; }
.exp-track { flex: 1; height: 5px; background: rgba(128,128,128,0.12); border-radius: 3px; overflow: hidden; }
.exp-fill { height: 100%; width: 67%; background: var(--fg); border-radius: 3px; transition: width 0.3s; }
.exp-text { font-size: 10px; color: var(--dim); white-space: nowrap; }

.status-bar { flex-shrink: 0; padding: 3px 10px; font-size: 10px; color: var(--dim); border-top: 1px solid var(--dim); line-height: 1.4; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }

.btn-bar { display: flex; flex-shrink: 0; border-top: 1px solid var(--dim); }
.bar-btn { flex: 1; background: transparent; border: none; color: var(--dim); font-family: inherit; font-size: 11px; padding: 6px 0; cursor: pointer; letter-spacing: 1px; border-right: 1px solid rgba(128,128,128,0.12); transition: color 0.15s, background 0.15s; }
.bar-btn:last-child { border-right: none; }
.bar-btn:active { transform: scale(0.96); }

.toast { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 4px 10px; background: rgba(0,0,0,0.85); border: 1px solid var(--dim); border-radius: 4px; color: var(--fg); font-size: 10px; white-space: nowrap; pointer-events: none; }
</style>
</head>
<body>

<div id="app">

<!-- LEFT -->
<div id="controls">

  <h2>主题设计器</h2>
  <p style="font-size:10px;color:#666;margin-bottom:2px;">选一个配色，导出 CSS 发给 AI。渐变 + 毛玻璃卡片默认常驻。</p>

  <!-- Colors -->
  <div class="section">
    <h3>配色</h3>
    <div class="color-grid" id="colorGrid"></div>
    <div id="customColors">
      <div class="custom-row"><label>--fg</label><input type="color" id="cFg" value="#00FF00"><input type="text" id="tFg" value="#00FF00"></div>
      <div class="custom-row"><label>--bg</label><input type="color" id="cBg" value="#0A0A0A"><input type="text" id="tBg" value="#0A0A0A"></div>
      <div class="custom-row"><label>--dim</label><input type="color" id="cDim" value="#00AA00"><input type="text" id="tDim" value="#00AA00"></div>
      <div class="custom-row"><label>--border</label><input type="color" id="cBorder" value="#00FF00"><input type="text" id="tBorder" value="#00FF00"></div>
    </div>
  </div>

  <!-- Export -->
  <div class="section">
    <h3>导出 CSS</h3>
    <div class="export-box"><pre id="exportCss">.theme-xxx { }</pre></div>
    <button class="cp-btn" id="copyBtn">复制 CSS</button>
  </div>

</div>

<!-- RIGHT: Preview -->
<div id="preview-area">
  <div class="phone" id="phone">
    <div class="titlebar">
      <span class="titlebar-id">ID:Worker</span>
      <span class="titlebar-sep">|</span>
      <span class="titlebar-lv">LV:5</span>
      <span class="titlebar-sep">|</span>
      <span class="titlebar-title">拾荒者</span>
      <div class="titlebar-btns"><button class="titlebar-btn">&times;</button></div>
    </div>

    <div class="hub-view">
      <div class="hub-welcome" id="previewWelcome">
        <div class="hub-greeting">[ 大 厅 ]</div>
        <div class="hub-player-name">Worker</div>
        <div class="hub-level">大厅 Lv.3 | 累计经验 523</div>
      </div>
      <div class="hub-cards">
        <div class="card" id="previewCard1"><div class="card-name">废土 (Wasteland)</div><div class="card-desc">在荒芜的废土上生存，寻找资源，建立庇护所。</div><div class="card-meta"><span>500 事件</span><span>50 成就</span></div></div>
        <div class="card" id="previewCard2"><div class="card-name">示例副本 (Demo)</div><div class="card-desc">用于预览主题效果的示例副本。</div><div class="card-meta"><span>100 事件</span><span>10 成就</span></div></div>
      </div>
    </div>

    <div class="exp-row"><div class="exp-track"><div class="exp-fill"></div></div><div class="exp-text">Lv.5 | 67%</div></div>
    <div class="status-bar">v2.2.0 | Worker | 废土<br>LV:5 | 拾荒者 | 1h23m | 成就:3</div>

    <div class="btn-bar">
      <button class="bar-btn">宠物</button>
      <button class="bar-btn">副本</button>
      <button class="bar-btn">称号</button>
      <button class="bar-btn">设置</button>
    </div>

    <div class="toast">提示：这是一个示例消息</div>
  </div>
</div>

</div>

<script>
const $ = id => document.getElementById(id);
function setCSSVar(name, value) { document.documentElement.style.setProperty(name, value); }

/* ── 14 color data ── */
const COLORS = [
  { id:'red',     label:'红',   fg:'#F38BA8', bg:'#1E0A10', dim:'#BA7D8F', g1:'#1A0000', g2:'#1E0A10' },
  { id:'red-orange',label:'红橙',fg:'#FAB387', bg:'#1E120A', dim:'#BF9E82', g1:'#1A0800', g2:'#1E120A' },
  { id:'orange',  label:'橙',   fg:'#FFB000', bg:'#0A0A0A', dim:'#AA7700', g1:'#0A0600', g2:'#0A0A0A' },
  { id:'yellow-orange',label:'黄橙',fg:'#F9D77E', bg:'#1E180A', dim:'#C4AB6E', g1:'#1A1400', g2:'#1E180A' },
  { id:'yellow',  label:'黄',   fg:'#F9E2AF', bg:'#1E1C0A', dim:'#C4B892', g1:'#1A1800', g2:'#1E1C0A' },
  { id:'yellow-green',label:'黄绿',fg:'#B8E3A1', bg:'#0E1E0A', dim:'#8FBA82', g1:'#0A0E00', g2:'#0E1E0A' },
  { id:'green',   label:'绿',   fg:'#00FF00', bg:'#0A0A0A', dim:'#00AA00', g1:'#050505', g2:'#0A0A0A' },
  { id:'cyan',    label:'蓝绿', fg:'#94E2D5', bg:'#0A1E1A', dim:'#75BAAD', g1:'#001818', g2:'#0A1E1A' },
  { id:'blue',    label:'蓝',   fg:'#E0E0E0', bg:'#1A1A2E', dim:'#555577', g1:'#0A0A1E', g2:'#1A1A2E' },
  { id:'blue-purple',label:'蓝紫',fg:'#A2A0F6', bg:'#0E0A1E', dim:'#7F7EC4', g1:'#0E0A1E', g2:'#0E0A1E' },
  { id:'purple',  label:'紫',   fg:'#CBA6F7', bg:'#1A0E1E', dim:'#A284C4', g1:'#14001E', g2:'#1A0E1E' },
  { id:'pink',    label:'红紫', fg:'#F5C2E7', bg:'#1E0E1A', dim:'#C49AB5', g1:'#1A0014', g2:'#1E0E1A' },
  { id:'black',   label:'黑',   fg:'#CCCCCC', bg:'#000000', dim:'#666666', g1:'#000000', g2:'#000000' },
  { id:'white',   label:'白',   fg:'#222222', bg:'#F5F0E8', dim:'#7A6F5E', g1:'#C0C0C0', g2:'#F5F0E8' },
];

const CUSTOM = { fg:'#00FF00', bg:'#0A0A0A', dim:'#00AA00', border:'#00FF00' };

const series = 'gradient';
let selectedColor = null; // color id string or 'custom'

/* ── Render color grid ── */
function renderColors() {
  const grid = $('colorGrid');
  grid.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (selectedColor === c.id ? ' active' : '');
    btn.textContent = c.label;
    btn.dataset.color = c.id;
    btn.style.background = c.bg;
    btn.style.color = c.fg;
    btn.addEventListener('click', () => selectColor(c.id));
    grid.appendChild(btn);
  });
  const customBtn = document.createElement('button');
  customBtn.className = 'color-btn custom-btn';
  customBtn.textContent = selectedColor === 'custom' ? '▸ 自定义' : '自定义';
  customBtn.addEventListener('click', () => selectColor('custom'));
  grid.appendChild(customBtn);
}

/* ── Select color ── */
function selectColor(id) {
  selectedColor = id;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll(`[data-color="${id}"]`);
  btns.forEach(b => b.classList.add('active'));
  if (id === 'custom') {
    $('customColors').classList.add('show');
    document.querySelector('.custom-btn').textContent = '▸ 自定义';
    applyCustomColor();
  } else {
    $('customColors').classList.remove('show');
    const c = COLORS.find(x => x.id === id);
    applyColor(id);
  }
}

function applyColor(id) {
  const c = COLORS.find(x => x.id === id);
  if (!c) return;
  setCSSVar('--fg', c.fg); setCSSVar('--bg', c.bg); setCSSVar('--dim', c.dim);
  setCSSVar('--border', c.dim);
  setCSSVar('--g1', c.g1); setCSSVar('--g2', c.g2);
  $('phone').classList.add('gradient-bg');
  updateExport();
}

function applyCustomColor() {
  const fg = $('tFg').value; const bg = $('tBg').value;
  const dim = $('tDim').value; const border = $('tBorder').value;
  setCSSVar('--fg', fg); setCSSVar('--bg', bg); setCSSVar('--dim', dim);
  setCSSVar('--border', border);
  setCSSVar('--g1', '#333'); setCSSVar('--g2', bg);
  $('phone').classList.add('gradient-bg');
  updateExport();
}

/* ── Bind custom color inputs ── */
function bindCustom(id) {
  const p = $(id); const t = $(id.replace('c', 't'));
  if (!t) return;
  const sync = () => { p.value = t.value; if (selectedColor === 'custom') applyCustomColor(); };
  p.addEventListener('input', sync);
  t.addEventListener('input', () => { if (/^#[0-9a-f]{6}$/i.test(t.value)) { p.value = t.value; sync(); } });
}
bindCustom('cFg'); bindCustom('cBg'); bindCustom('cDim'); bindCustom('cBorder');

/* ── Export ── */
function updateExport() {
  const name = selectedColor === 'custom' ? 'custom' : (selectedColor || 'default');
  const themeName = `theme-${name}`;

  const c = selectedColor === 'custom' ? null : COLORS.find(c => c.id === selectedColor);
  const fg = selectedColor === 'custom' ? $('tFg').value : (c?.fg || '#00FF00');
  const bg = selectedColor === 'custom' ? $('tBg').value : (c?.bg || '#0A0A0A');
  const dim = selectedColor === 'custom' ? $('tDim').value : (c?.dim || '#00AA00');
  const border = selectedColor === 'custom' ? $('tBorder').value : dim;

  let css = `.${themeName} {\n  --fg: ${fg};\n  --bg: ${bg};\n  --dim: ${dim};\n  --border: ${border};\n}`;

  const g1 = selectedColor === 'custom' ? '#333' : (c?.g1 || bg);
  const g2 = selectedColor === 'custom' ? bg : (c?.g2 || bg);
  css += `\n\n.${themeName} #app {\n  background: linear-gradient(180deg, ${g1}, ${g2});\n}`;

  css += `\n\n.${themeName} .card {\n  background: rgba(255,255,255,0.08);\n  backdrop-filter: blur(10px);\n  -webkit-backdrop-filter: blur(10px);\n  border-radius: 12px;\n  border: 1px solid rgba(255,255,255,0.15);\n}`;

  $('exportCss').textContent = css;
}

/* ── Copy ── */
$('copyBtn').addEventListener('click', async () => {
  const txt = $('exportCss').textContent;
  try { await navigator.clipboard.writeText(txt); }
  catch { const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  const btn = $('copyBtn'); btn.textContent = '已复制!'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '复制 CSS'; btn.classList.remove('copied'); }, 1500);
});

/* ── Init ── */
renderColors();
selectColor('green');
</script>
</body>
</html>
