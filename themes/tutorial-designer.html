<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教程界面排版设计器</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%;height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a1a;color:#e0e0e0;overflow:hidden; }
#app { display:flex;height:100vh; }

/* Left panel */
#controls { width:420px;min-width:420px;overflow-y:auto;background:#222;border-right:1px solid #444;padding:16px;display:flex;flex-direction:column;gap:6px; }
#controls::-webkit-scrollbar { width:4px; }
#controls::-webkit-scrollbar-track { background:transparent; }
#controls::-webkit-scrollbar-thumb { background:#555;border-radius:2px; }
h2 { font-size:14px;color:#fff;letter-spacing:1px; }
h3 { font-size:12px;color:#aaa;margin:4px 0 6px;border-bottom:1px solid #333;padding-bottom:3px; }
.section { background:#2a2a2a;border-radius:6px;padding:10px 12px; }

.input-group { margin-bottom:4px; }
.input-group label { display:block;font-size:10px;color:#888;margin-bottom:2px; }
.input-group input, .input-group textarea { width:100%;background:#333;border:1px solid #555;color:#eee;padding:4px 8px;font-family:'Consolas',monospace;font-size:12px;border-radius:3px;outline:none; }
.input-group input:focus, .input-group textarea:focus { border-color:#888; }
.input-group textarea { resize:vertical;min-height:20px; }

.export-box { background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:8px;margin-top:4px; }
.export-box pre { font-family:'Consolas',monospace;font-size:10px;color:#ccc;white-space:pre-wrap;word-break:break-all;line-height:1.4;max-height:100px;overflow-y:auto; }
.cp-btn { display:block;margin-top:4px;width:100%;padding:5px 0;background:#0078D7;border:none;color:#fff;font-size:11px;cursor:pointer;border-radius:3px; }
.cp-btn:hover { background:#1a8ae8; }
.cp-btn:active { transform:scale(0.98); }
.cp-btn.copied { background:#388e3c; }

/* Preview */
#preview-area { flex:1;display:flex;align-items:center;justify-content:center;background:repeating-conic-gradient(#181818 0% 25%,#1f1f1f 0% 50%) 0 0 / 20px 20px; }
.phone { width:320px;height:640px;border-radius:12px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.05);display:flex;flex-direction:column;background:#0A0A0A;color:#00FF00;font-family:'Consolas','Courier New',monospace; }

.titlebar { display:flex;align-items:center;height:28px;flex-shrink:0;background:rgba(0,255,0,0.04);border-bottom:1px solid #00AA00;padding:0 8px;font-size:12px; }
.titlebar-id { font-weight:bold; }
.titlebar-sep { color:#00AA00;margin:0 4px;font-size:10px; }
.titlebar-btn { margin-left:auto;width:28px;height:28px;background:transparent;border:none;color:#00AA00;font-size:11px;cursor:default;display:flex;align-items:center;justify-content:center; }

.onboarding { flex:1;display:flex;align-items:center;justify-content:center;padding:20px; }
.ob-box { background:#0A0A0A;border:1px solid #00FF00;border-radius:8px;padding:20px;width:280px;box-shadow:0 0 40px rgba(0,255,0,0.2); }
.ob-title { font-weight:bold;font-size:14px;letter-spacing:1px;text-align:center;color:#00FF00; }
.ob-subtitle { font-weight:bold;font-size:12px;margin-bottom:10px;letter-spacing:1px;text-align:center;color:#00FF00; }
.ob-body { }
.ob-body p { font-size:11px;line-height:1.6;margin-bottom:4px;color:#00AA00;text-align:center; }
.ob-body p b { color:#00FF00; }
.ob-name-row { margin:8px 0;display:flex;align-items:center;gap:6px;justify-content:center; }
.ob-name-row label { font-size:11px;color:#00FF00;white-space:nowrap;flex-shrink:0; }
.ob-name { flex:1;min-width:0;background:rgba(0,255,0,0.05);border:1px solid #00AA00;color:#00FF00;padding:4px 8px;font-family:inherit;font-size:11px;outline:none; }
.ob-hint { margin-top:8px;font-size:11px;color:#00AA00;opacity:0.6;text-align:center; }
.ob-ok { display:block;margin:14px auto 0;background:transparent;border:1px solid #00FF00;color:#00FF00;padding:6px 24px;font-family:inherit;font-size:11px;cursor:pointer;letter-spacing:1px; }
.ob-ok:active { transform:scale(0.96); }

.btn-bar { display:flex;flex-shrink:0;border-top:1px solid #00AA00; }
.bar-btn { flex:1;background:transparent;border:none;color:#00AA00;font-family:inherit;font-size:11px;padding:6px 0;cursor:pointer;letter-spacing:1px;border-right:1px solid rgba(10,90,10,0.3); }
.bar-btn:last-child { border-right:none; }
</style>
</head>
<body>

<div id="app">

<!-- LEFT -->
<div id="controls">
  <h2>教程界面排版设计器</h2>
  <p style="font-size:10px;color:#666;margin-bottom:2px;">修改文字内容，右侧实时预览。调好点复制发给 AI。</p>

  <div class="section">
    <h3>标题区</h3>
    <div class="input-group"><label>第1行（标题）</label><input type="text" id="line1" value="欢迎来到"></div>
    <div class="input-group"><label>第2行（副标题）</label><input type="text" id="line2" value="Idel-DreamMaker"></div>
  </div>

  <div class="section">
    <h3>正文区（每行一句，空行=分段）</h3>
    <div class="input-group">
      <textarea id="bodyText" rows="8">藏在系统托盘里的宠物陪伴应用
挂机升级 · 解锁称号与成就
触发故事事件——陪你度过每一刻

你的名称：{name}

如何开始：

1. 点击 [副本] 或 [+ 抽取副本] 选择一个故事世界
2. 进入后自动挂机，经验随时间增长
3. 升级解锁称号，随机弹出故事事件
4. 随时点击 [大厅] 退出，经验累入全局等级</textarea>
    </div>
  </div>

  <div class="section">
    <h3>底部区</h3>
    <div class="input-group"><label>提示文字（留空=不显示）</label><input type="text" id="hintText" value="提示：宠物窗口常驻桌面，点击宠物可交互"></div>
    <div class="input-group"><label>按钮文字</label><input type="text" id="btnText" value="开始冒险"></div>
  </div>

  <div class="section">
    <h3>导出</h3>
    <div class="export-box"><pre id="exportData">{ }</pre></div>
    <button class="cp-btn" id="copyBtn">复制文字内容给 AI</button>
  </div>
</div>

<!-- RIGHT: Preview -->
<div id="preview-area">
  <div class="phone">
    <div class="titlebar">
      <span class="titlebar-id">ID:Worker</span>
      <span class="titlebar-sep">|</span>
      <span>LV:5</span>
      <span class="titlebar-sep">|</span>
      <span>拾荒者</span>
      <button class="titlebar-btn">&times;</button>
    </div>
    <div class="onboarding">
      <div class="ob-box" id="obBox">
        <div class="ob-title" id="previewTitle">欢迎来到</div>
        <div class="ob-subtitle" id="previewSubtitle">Idel-DreamMaker</div>
        <div class="ob-body" id="previewBody"></div>
        <div class="ob-hint" id="previewHint">提示：宠物窗口常驻桌面，点击宠物可交互</div>
        <button class="ob-ok" id="previewBtn">开始冒险</button>
      </div>
    </div>
    <div class="btn-bar">
      <button class="bar-btn">宠物</button>
      <button class="bar-btn">副本</button>
      <button class="bar-btn">称号</button>
      <button class="bar-btn">设置</button>
    </div>
  </div>
</div>

</div>

<script>
const $ = id => document.getElementById(id);

function render() {
  $('previewTitle').textContent = $('line1').value || '欢迎来到';
  $('previewSubtitle').textContent = $('line2').value || 'Idel-DreamMaker';
  $('previewBtn').textContent = $('btnText').value || '开始冒险';

  const hint = $('hintText').value.trim();
  $('previewHint').textContent = hint;
  $('previewHint').style.display = hint ? '' : 'none';

  // Render body with name row support
  const raw = $('bodyText').value;
  const lines = raw.split('\n');
  let html = '';
  lines.forEach(line => {
    const trimmed = line.trim();
    if (trimmed === '') { html += '<p style="margin-bottom:8px"></p>'; return; }
    // Check for name row pattern
    if (trimmed.startsWith('你的名称：') || trimmed.startsWith('{name}')) {
      html += `<div class="ob-name-row"><label>你的名称：</label><input class="ob-name" value="Worker"></div>`;
      return;
    }
    // Escape HTML and handle **bold** markers
    const escaped = trimmed.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const withBold = escaped.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\[(.+?)\]/g, '<b>[$1]</b>');
    html += `<p>${withBold}</p>`;
  });
  $('previewBody').innerHTML = html;
  updateExport();
}

function updateExport() {
  const data = {
    title: $('line1').value,
    subtitle: $('line2').value,
    body: $('bodyText').value,
    hint: $('hintText').value,
    button: $('btnText').value
  };
  $('exportData').textContent = JSON.stringify(data, null, 2);
}

$('line1').addEventListener('input', render);
$('line2').addEventListener('input', render);
$('bodyText').addEventListener('input', render);
$('hintText').addEventListener('input', render);
$('btnText').addEventListener('input', render);

$('copyBtn').addEventListener('click', async () => {
  const txt = $('exportData').textContent;
  try { await navigator.clipboard.writeText(txt); }
  catch { const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  const btn = $('copyBtn'); btn.textContent = '已复制!'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '复制文字内容给 AI'; btn.classList.remove('copied'); }, 1500);
});

render();
</script>
</body>
</html>
